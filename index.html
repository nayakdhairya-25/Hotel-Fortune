<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fortune Hotel | South Bombay Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #048B59;
            --secondary: #bedea6;
            --dark: #0a1f18;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfdfc;
            color: var(--dark);
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, .playfair {
            font-family: 'Playfair Display', serif;
        }
        .text-primary { color: var(--primary); }
        .bg-primary { background-color: var(--primary); }
        .text-secondary { color: var(--secondary); }
        .bg-secondary { background-color: var(--secondary); }
        
        /* Navigation Overlay - Light Green */
        #nav-overlay {
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            transform: translateY(-100%);
            background-color: var(--secondary);
            visibility: hidden;
        }
        #nav-overlay.open {
            transform: translateY(0);
            visibility: visible;
        }

        .page-section { display: none; min-height: 100vh; }
        .page-section.active { display: block; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .img-container { 
            overflow: hidden; 
            border-radius: 4px; 
            background-color: #e5e7eb; 
            position: relative;
        }
        .img-container img { 
            transition: transform 1.2s ease; 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        .img-container:hover img { transform: scale(1.08); }

        .btn-luxury {
            background-color: var(--primary);
            color: white;
            padding: 1.25rem 3rem;
            letter-spacing: 0.3em;
            font-size: 0.7rem;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-block;
            text-decoration: none;
            cursor: pointer;
            border: none;
        }
        .btn-luxury:hover {
            background-color: var(--dark);
            transform: translateY(-2px);
            color: var(--secondary);
        }

        .nav-item {
            position: relative;
            color: var(--primary);
            text-decoration: none;
            transition: opacity 0.3s ease;
        }
        .nav-item:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="fixed w-full z-[300] px-8 py-8 flex justify-between items-center transition-colors duration-500" id="main-header">
        <div class="text-2xl font-bold tracking-[0.4em] playfair cursor-pointer transition-colors" onclick="showPage('home')" id="logo">
            FORTUNE
        </div>
        <button onclick="toggleMenu()" class="flex items-center gap-4 group focus:outline-none z-[400]" id="menu-btn">
            <span class="text-[10px] uppercase tracking-[0.5em] font-bold transition-colors" id="menu-text">Menu</span>
            <div class="flex flex-col gap-1.5 items-end">
                <div class="w-8 h-[2px] bg-current transition-all" id="bar1"></div>
                <div class="w-5 h-[2px] bg-current transition-all" id="bar2"></div>
            </div>
        </button>
    </header>

    <!-- Navigation Overlay (Light Green) -->
    <div id="nav-overlay" class="fixed inset-0 z-[250] flex items-center justify-center">
        <nav class="text-center space-y-12">
